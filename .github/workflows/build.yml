name: Build Baseline

on:
  push:
    branches: [ "master", "main", "dev" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: |
          set -euo pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Configure Gradle properties
        run: |
          set -euo pipefail
          {
            echo 'android.sdk.channel=3'
            echo 'android.native.buildOutput=verbose'
            echo 'org.gradle.caching=true'
            echo 'org.gradle.parallel=true'
          } >> gradle.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Gradle configuration check
        run: ./gradlew projects --stacktrace

      - name: Assemble UI debug
        run: ./gradlew :ui:assembleDebug --stacktrace

      - name: Assemble module debug
        run: ./gradlew :module:assembleDebug --stacktrace
