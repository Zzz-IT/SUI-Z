name: Build Baseline

on:
  push:
    branches: [ "master", "main", "dev" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Gradle configuration check
        run: ./gradlew projects --stacktrace

      - name: Assemble UI debug
        run: ./gradlew :ui:assembleDebug --stacktrace

      - name: Assemble module debug
        run: ./gradlew :module:assembleDebug --stacktrace
