name: Static Guards

on:
  push:
    branches: [ "master", "main", "dev" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  grep:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Code Pattern Guards
        run: |
          set -euo pipefail

          if grep -R -n -- '-D_FORTIFY_SOURCE=0\|-U_FORTIFY_SOURCE' module/src/main/cpp; then
            echo "Error: FORTIFY must not be disabled"
            exit 1
          fi

          if grep -R -n 'moduleId *= *".* .*"' module.gradle; then
            echo "Error: moduleId must not contain spaces"
            exit 1
          fi

          if grep -R -n 'RestrictedBridgeBinder' module/src/main/java/rikka/sui/systemserver; then
            echo "Error: RestrictedBridgeBinder must not be implemented in system_server"
            exit 1
          fi

          if grep -n 'private void sendBinder' module/src/main/java/rikka/sui/systemserver/BridgeService.java; then
            echo "Error: sendBinder must return boolean"
            exit 1
          fi

          if grep -R -n 'xiaotong6666.github.io/Sui' module/build.gradle template; then
            echo "Error: updateJson still points to old upstream"
            exit 1
          fi

          if grep -R -n 'rikka\.SUI Z\|package .*SUI Z\|import .*SUI Z' ui/src module/src api/*/src; then
            echo "Error: invalid Java/Kotlin package/import contains SUI Z"
            exit 1
          fi

          if grep -R -n 'namespace *= *".* .*"' ui module; then
            echo "Error: Android namespace must not contain spaces"
            exit 1
          fi

          if grep -R -n 'rikka\.sui\.ui\.BuildConfig' ui/src; then
            echo "Error: wrong BuildConfig package; use rikka.sui.BuildConfig"
            exit 1
          fi

          if grep -R -n 'ZYGISK_MODULE_ID:STRING=\\"' module/build.gradle; then
            echo "Error: ZYGISK_MODULE_ID must not be pre-quoted in Gradle"
            exit 1
          fi

          if ! grep -R -n 'ACTION_REGISTER_TOKEN' api/shared/src/main/java/rikka/sui/util/BridgeConstants.java; then
            echo "Error: bridge token action is missing"
            exit 1
          fi

          if ! grep -R -n 'shellRegisterToken' module/src/main/java/rikka/sui/systemserver/BridgeService.java; then
            echo "Error: shell token check is missing"
            exit 1
          fi

          if ! grep -q 'reply.writeInt(ok ? 1 : 0)' module/src/main/java/rikka/sui/systemserver/BridgeService.java; then
            echo "Error: ACTION_SEND_BINDER must write accepted status in success/fail paths"
            exit 1
          fi

          if ! grep -q 'reply.writeInt(accepted ? 1 : 0)' module/src/main/java/rikka/sui/systemserver/BridgeService.java; then
            echo "Error: ACTION_REGISTER_TOKEN must write accepted status"
            exit 1
          fi

          if ! grep -q 'data.writeString(rootToken)' module/src/main/java/rikka/sui/server/SuiService.java; then
            echo "Error: root binder request must write root token to parcel"
            exit 1
          fi

          if ! grep -q 'isValidShellDelegateToken' module/src/main/java/rikka/sui/server/SuiService.java; then
            echo "Error: requestPermissionFromShell must verify shell delegate token"
            exit 1
          fi

          if ! grep -q 'boolean registerBridgeTokens' module/src/main/java/rikka/sui/server/bridge/BridgeServiceClient.java; then
            echo "Error: registerBridgeTokens must return accepted state"
            exit 1
          fi

          if [ ! -f CHANGELOG.md ]; then
            echo "Error: CHANGELOG.md is missing"
            exit 1
          fi

          if [ ! -f scripts/extract_changelog.sh ]; then
            echo "Error: scripts/extract_changelog.sh is missing"
            exit 1
          fi

          if [ ! -f scripts/smoke_check.sh ]; then
            echo "Error: scripts/smoke_check.sh is missing"
            exit 1
          fi

          if ! grep -q 'scripts/extract_changelog.sh' .github/workflows/release.yml; then
            echo "Error: release workflow must read notes from CHANGELOG.md"
            exit 1
          fi

          if ! grep -q 'gh release create' .github/workflows/release.yml; then
            echo "Error: release workflow must create GitHub Release"
            exit 1
          fi

          if ! grep -q 'scripts/smoke_check.sh' .github/workflows/release.yml; then
            echo "Error: release workflow must smoke-check ZIP before publishing"
            exit 1
          fi
