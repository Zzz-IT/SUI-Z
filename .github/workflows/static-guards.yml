name: Static Guards & Lint

on:
  push:
    branches: [ "master", "main", "dev" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

jobs:
  lint-and-grep:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - run: chmod +x ./gradlew

      - name: Run Android Lint
        run: ./gradlew lintDebug lintRelease --stacktrace

      - name: Code Pattern Guards
        run: |
          if grep -R -- '-D_FORTIFY_SOURCE=0\|-U_FORTIFY_SOURCE' -n module/src/main/cpp; then
            echo "Error: FORTIFY must not be disabled"
            exit 1
          fi

          if grep -R 'moduleId *= *".* .*"' -n module.gradle; then
            echo "Error: moduleId must not contain spaces"
            exit 1
          fi

          if grep -R 'RestrictedBridgeBinder' -n module/src/main/java/rikka/sui/systemserver; then
            echo "Error: RestrictedBridgeBinder must not be implemented in system_server"
            exit 1
          fi

          if grep -n 'private void sendBinder' module/src/main/java/rikka/sui/systemserver/BridgeService.java; then
            echo "Error: sendBinder must return boolean"
            exit 1
          fi

          if grep -R 'xiaotong6666.github.io/Sui' -n module/build.gradle template; then
            echo "Error: updateJson still points to old upstream"
            exit 1
          fi

          if grep -R 'rikka\.SUI Z\|package .*SUI Z\|import .*SUI Z' -n ui/src module/src api/*/src; then
            echo "Error: invalid Java/Kotlin package/import contains SUI Z"
            exit 1
          fi

          if grep -R 'namespace *= *".* .*"' -n ui module; then
            echo "Error: Android namespace must not contain spaces"
            exit 1
          fi
