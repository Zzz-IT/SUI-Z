name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Validate tag format
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Error: invalid tag format: $TAG"
            echo "Expected examples: v1.0.0, v1.0.0-rc.1"
            exit 1
          fi

          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: |
          set -euo pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Configure Gradle properties
        run: |
          set -euo pipefail
          {
            echo 'android.sdk.channel=3'
            echo 'android.native.buildOutput=verbose'
            echo 'org.gradle.caching=true'
            echo 'org.gradle.parallel=true'
          } >> gradle.properties

      - name: Make gradlew executable
        run: |
          set -euo pipefail
          chmod +x ./gradlew

      - name: Extract changelog
        run: |
          set -euo pipefail

          bash scripts/extract_changelog.sh "$TAG" CHANGELOG.md > release_notes.md

          echo "Release notes:"
          cat release_notes.md

      - name: Build release ZIP
        run: |
          set -euo pipefail
          ./gradlew :module:zipRelease --stacktrace

      - name: Locate ZIP
        run: |
          set -euo pipefail

          ZIP_FILE="$(find out -maxdepth 1 -type f -name "*.zip" | sort | head -n 1)"
          if [ -z "$ZIP_FILE" ]; then
            echo "Error: Output ZIP not found"
            find out -maxdepth 3 -type f | sort || true
            exit 1
          fi

          echo "ZIP_FILE=$ZIP_FILE" >> "$GITHUB_ENV"
          echo "ZIP_NAME=$(basename "$ZIP_FILE")" >> "$GITHUB_ENV"

      - name: Smoke check ZIP
        run: |
          set -euo pipefail
          bash scripts/smoke_check.sh "$ZIP_FILE"

      - name: Generate SHA256
        run: |
          set -euo pipefail

          sha256sum "$ZIP_FILE" | tee "$ZIP_FILE.sha256"

      - name: Generate KernelSU update metadata
        run: |
          set -euo pipefail

          VERSION_CODE="$(grep '^versionCode=' out/release/module.prop | cut -d= -f2)"
          VERSION_NAME="$(grep '^version=' out/release/module.prop | cut -d= -f2 | sed 's/ (.*//')"
          ZIP_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ZIP_NAME}"
          CHANGELOG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"

          cat > "$RUNNER_TEMP/sui_zygisk.json" <<EOF
          {
            "version": "$VERSION_NAME",
            "versionCode": $VERSION_CODE,
            "zipUrl": "$ZIP_URL",
            "changelog": "$CHANGELOG_URL"
          }
          EOF

          cat "$RUNNER_TEMP/sui_zygisk.json"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PRERELEASE_FLAG=""
          if [[ "$TAG" == *"-"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            "$ZIP_FILE" \
            "$ZIP_FILE.sha256" \
            "$RUNNER_TEMP/sui_zygisk.json" \
            --title "$TAG" \
            --notes-file release_notes.md \
            $PRERELEASE_FLAG

      - name: Commit KernelSU update metadata
        run: |
          set -euo pipefail

          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          # Drop workflow-local changes before switching back to the default branch.
          git restore --worktree --staged gradle.properties gradlew update/sui_zygisk.json || true

          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          mkdir -p update
          cp "$RUNNER_TEMP/sui_zygisk.json" update/sui_zygisk.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add update/sui_zygisk.json

          if git diff --cached --quiet; then
            echo "KernelSU update metadata unchanged"
            exit 0
          fi

          git commit -m "chore: update KernelSU metadata for ${TAG}"
          git push origin "$DEFAULT_BRANCH"
