name: Android Package Check

on:
  push:
    branches: [ "master", "main", "dev" ]
  pull_request:
    branches: [ "master", "main", "dev" ]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  package:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: |
          set -euo pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Configure Gradle properties
        run: |
          set -euo pipefail
          {
            echo 'android.sdk.channel=3'
            echo 'android.native.buildOutput=verbose'
            echo 'org.gradle.caching=true'
            echo 'org.gradle.parallel=true'
          } >> gradle.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Static guards
        run: bash scripts/static_guard.sh

      - name: Assemble Debug
        run: ./gradlew :module:assembleDebug --stacktrace --no-daemon

      - name: Assemble Release
        run: ./gradlew :module:assembleRelease --stacktrace --no-daemon

      - name: Build Release ZIP
        run: ./gradlew :module:zipRelease --stacktrace --no-daemon

      - name: Smoke check package
        run: |
          set -euo pipefail
          ZIP_FILE="$(find out -maxdepth 1 -type f -name "*.zip" | sort | head -n 1)"
          if [ -z "$ZIP_FILE" ]; then
            echo "Error: Output ZIP not found"
            find out -maxdepth 3 -type f | sort || true
            exit 1
          fi

          echo "ZIP=$ZIP_FILE"
          bash scripts/smoke_check.sh "$ZIP_FILE"
