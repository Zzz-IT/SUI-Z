name: Package Structure Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-package:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - run: yes | sdkmanager --licenses || true
      - run: chmod +x ./gradlew

      - name: Build Release ZIP
        run: ./gradlew :module:zipRelease --stacktrace

      - name: Check Package Structure
        run: |
          set -e
          ZIP_FILE=$(find out -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
             echo "Error: Output ZIP not found"
             exit 1
          fi

          unzip -l "$ZIP_FILE" > zip_contents.txt
          unzip -p "$ZIP_FILE" module.prop > module.prop.txt

          grep -q "module.prop" zip_contents.txt
          grep -q "sui.dex" zip_contents.txt
          grep -q "sui.apk" zip_contents.txt
          grep -q "lib/" zip_contents.txt
          grep -q "libsui.so" zip_contents.txt

          grep -q "^id=zygisk-suiz$" module.prop.txt
          grep -q "^name=Zygisk - SUI Z$" module.prop.txt

          if grep -q "xiaotong6666.github.io/Sui" module.prop.txt; then
            echo "Error: old updateJson detected"
            exit 1
          fi
