name: Package Structure Check

on:
  push:
    branches: [ "master", "main", "dev" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  check-package:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: |
          set -euo pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Configure Gradle properties
        run: |
          set -euo pipefail
          {
            echo 'android.sdk.channel=3'
            echo 'android.native.buildOutput=verbose'
            echo 'org.gradle.caching=true'
            echo 'org.gradle.parallel=true'
          } >> gradle.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release ZIP
        run: ./gradlew :module:zipRelease --stacktrace

      - name: Check Package Structure
        run: |
          set -euo pipefail

          ZIP_FILE="$(find out -maxdepth 1 -type f -name "*.zip" | sort | head -n 1)"
          if [ -z "$ZIP_FILE" ]; then
            echo "Error: Output ZIP not found"
            find out -maxdepth 3 -type f | sort || true
            exit 1
          fi

          echo "ZIP=$ZIP_FILE"
          unzip -l "$ZIP_FILE" | tee zip_contents.txt
          unzip -p "$ZIP_FILE" module.prop | tee module.prop.txt

          grep -q "module.prop" zip_contents.txt
          grep -q "sui.dex" zip_contents.txt
          grep -q "sui.apk" zip_contents.txt
          grep -q "lib/" zip_contents.txt
          grep -q "libsui.so" zip_contents.txt

          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            grep -q "lib/$abi/libsui.so" zip_contents.txt || { echo "Error: missing lib/$abi/libsui.so"; exit 1; }
          done

          grep -q "^id=zygisk-suiz$" module.prop.txt
          grep -q "^name=Zygisk - SUI Z$" module.prop.txt

          if grep -q "xiaotong6666.github.io/Sui" module.prop.txt; then
            echo "Error: old updateJson detected"
            exit 1
          fi
