buildscript {
    configurations.classpath {
        resolutionStrategy {
            force "org.bouncycastle:bcpkix-jdk18on:1.84"
            force "org.bouncycastle:bcprov-jdk18on:1.84"
            force "org.bouncycastle:bcutil-jdk18on:1.84"
        }
    }
}

plugins {
    id "idea"
    alias libs.plugins.spotless
    alias libs.plugins.android.application apply false
    alias libs.plugins.android.library apply false
    alias libs.plugins.kotlin.android apply false
    alias libs.plugins.refine apply false
}

def forcedDependencies = [
        "org.bitbucket.b_c:jose4j:0.9.6",            // Fix CVE-2024-29371
        "org.jdom:jdom2:2.0.6.1",                    // Fix CVE-2021-33813
        "org.apache.commons:commons-lang3:3.20.0",  // Fix CVE-2025-48924
        "org.bouncycastle:bcpkix-jdk18on:1.84",     // Fix GHSA-8xfc-gm6g-vgpv via AGP classpath
        "org.bouncycastle:bcprov-jdk18on:1.84",
        "org.bouncycastle:bcutil-jdk18on:1.84",
]

allprojects {
    configurations.configureEach {
        resolutionStrategy {
            forcedDependencies.each { force it }
        }
    }
}

def NDK_VERSION = "30.0.14904198"
idea.module {
    excludeDirs += file("out")
    resourceDirs += file("template")
    resourceDirs += file("scripts")
}

subprojects {
    plugins.withId("com.android.base") {
        android {
            compileSdk = 37
            buildToolsVersion = "36.0.0"
            ndkVersion = NDK_VERSION
            defaultConfig {
                minSdk = 23
                targetSdk = 36
            }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_21
                targetCompatibility = JavaVersion.VERSION_21
            }
            buildFeatures {
                aidl = true
            }
        }
    }

    tasks.withType(JavaCompile).configureEach {
        options.compilerArgs << "-Xlint:deprecation"
    }
}

spotless {
    lineEndings = "UNIX"

    java {
        target "**/src/*/java/**/*.java"
        targetExclude "**/build/**"

        palantirJavaFormat()
        importOrder()
        removeUnusedImports()
        formatAnnotations()
    }

    kotlin {
        target "**/src/*/kotlin/**/*.kt", "**/src/*/java/**/*.kt"
        targetExclude "**/build/**"
        ktlint().editorConfigOverride([
                "ktlint_standard_max-line-length": "disabled"
        ])
    }
    format "cpp", {
        target "**/src/main/cpp/**/*.c", "**/src/main/cpp/**/*.cpp", "**/src/main/cpp/**/*.h", "**/src/main/cpp/**/*.hpp"
        targetExclude "**/build/**"

        def sdkDir = ""
        Properties properties = new Properties()
        File localProps = file("local.properties")
        if (localProps.exists()) {
            localProps.withInputStream { properties.load(it) }
            sdkDir = properties.getProperty("sdk.dir")
        }
        if (!sdkDir) {
            sdkDir = System.getenv("ANDROID_HOME") ?: System.getenv("ANDROID_SDK_ROOT")
        }
        if (!sdkDir) {
            def commonPaths = ["/opt/android-sdk", "/usr/local/lib/android/sdk"]
            for (path in commonPaths) {
                if (new File(path).exists()) {
                    sdkDir = path
                    break
                }
            }
        }
        def osName = System.getProperty("os.name").toLowerCase()
        def platform = osName.contains("linux") ? "linux-x86_64" :
                osName.contains("mac") ? "darwin-x86_64" : "windows-x86_64"
        def ndkVersion = NDK_VERSION
        def clangPath = "${sdkDir}/ndk/${ndkVersion}/toolchains/llvm/prebuilt/${platform}/bin/clang-format"
        if (osName.contains("windows")) clangPath += ".exe"
        File clangFile = new File(clangPath)
        if (clangFile.exists()) {
            clangFormat("21.0.0").style("file").pathToExe(clangPath)
        } else {
            println "Spotless Warning: Clang-format not found at ${clangPath}"
            clangFormat().style("file")
        }
    }
}

tasks.register("format") {
    dependsOn "spotlessApply"
    group = "formatting"
    description = "Formats the code using Spotless"
}
